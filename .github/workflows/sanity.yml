name: Sanity

on:
  push:
  pull_request:

jobs:
  non-proprietary-checks:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java for jar inspection
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check committed whitespace
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "pull_request" -and -not [string]::IsNullOrWhiteSpace($env:GITHUB_BASE_REF)) {
            $baseRef = "origin/$env:GITHUB_BASE_REF"
            $mergeBase = git merge-base $baseRef HEAD
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($mergeBase)) {
              throw "Could not determine merge base for $baseRef"
            }
            $commits = @(git rev-list "$mergeBase..HEAD")
            if ($commits.Count -eq 0) {
              git show --check --pretty=format: --no-renames HEAD
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
            foreach ($commit in $commits) {
              git show --check --pretty=format: --no-renames $commit
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          } else {
            git show --check --pretty=format: --no-renames HEAD
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Path . -Recurse -Filter *.ps1
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors -and $errors.Count -gt 0) {
              throw "PowerShell parse failed for $($script.FullName): $($errors[0].Message)"
            }
          }

      - name: Validate documentation links
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\validate-doc-links.ps1

      - name: Reject stale stock-review pending purchase class
        shell: pwsh
        run: |
          if (Test-Path .\src\weaponsprocurement\gui\StockReviewPendingPurchase.java) {
            throw "Stale StockReviewPendingPurchase.java exists; use StockReviewPendingTrade."
          }

      - name: Validate committed jar stale classes
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\validate-jar-classes.ps1 -JarPath .\jars\weapons-procurement.jar -Label Repo
